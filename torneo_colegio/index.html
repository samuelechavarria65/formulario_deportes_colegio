<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula Torneo Deportivo</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            color:#222;
            padding:20px;
        }

        .contenedor{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#1b4332;
        }

        fieldset{
            border:2px solid #1b4332;
            border-radius:10px;
            padding:20px;
            margin-bottom:20px;
        }

        legend{
            padding:0 10px;
            font-weight:bold;
            color:#1b4332;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:10px;
            border:1px solid #999;
            border-radius:6px;
            font-size:16px;
        }

        textarea{
            resize:vertical;
        }

        .radio-group{
            margin-top:10px;
        }

        .radio-group label{
            display:inline-block;
            margin-right:15px;
            font-weight:normal;
        }

        input:focus,
        select:focus,
        textarea:focus,
        button:focus{
            outline:3px solid #40916c;
            outline-offset:2px;
        }

        .ayuda{
            font-size:14px;
            color:#555;
            margin-top:4px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#1b4332;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#2d6a4f;
        }

        @media(max-width:600px){

            .contenedor{
                padding:20px;
            }

            h1{
                font-size:24px;
            }

        }

    </style>
</head>

<body>

    <div class="contenedor">

        <h1>🏆 Matrícula Torneo Deportivo</h1>

        <form action="#" method="POST" enctype="multipart/form-data">

            <fieldset>

                <legend>Información del participante</legend>

                <label for="nombre">Nombre completo</label>
                <input 
                    type="text" 
                    id="nombre" 
                    name="nombre"
                    required
                    minlength="3"
                    placeholder="Escribe tu nombre completo"
                >

                <label for="email">Correo electrónico</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    required
                    placeholder="ejemplo@correo.com"
                >

                <label for="grado">Grado</label>
                <select id="grado" name="grado" required>
                    <option value="">Seleccione un grado</option>
                    <option>6°</option>
                    <option>7°</option>
                    <option>8°</option>
                    <option>9°</option>
                    <option>10°</option>
                    <option>11°</option>
                </select>

                <label for="deporte">Deporte</label>
                <select id="deporte" name="deporte" required>
                    <option value="">Seleccione un deporte</option>
                    <option>Fútbol</option>
                    <option>Baloncesto</option>
                    <option>Voleibol</option>
                    <option>Natación</option>
                    <option>Atletismo</option>
                </select>

            </fieldset>

            <fieldset>

                <legend>Nivel y salud</legend>

                <p><strong>Nivel del participante</strong></p>

                <div class="radio-group">

                    <input type="radio" id="principiante" name="nivel" value="Principiante" required>
                    <label for="principiante">Principiante</label>

                    <input type="radio" id="intermedio" name="nivel" value="Intermedio">
                    <label for="intermedio">Intermedio</label>

                    <input type="radio" id="avanzado" name="nivel" value="Avanzado">
                    <label for="avanzado">Avanzado</label>

                </div>

                <label for="condicion">
                    Condición médica relevante
                </label>

                <textarea 
                    id="condicion"
                    name="condicion"
                    rows="4"
                    aria-describedby="info-condicion"
                    placeholder="Escribe si tienes alguna condición médica importante"
                ></textarea>

                <p id="info-condicion" class="ayuda">
                    Si no tienes ninguna condición médica, escribe “Ninguna”.
                </p>

                <label for="foto">Foto del participante</label>
                <input 
                    type="file" 
                    id="foto" 
                    name="foto"
                    accept="image/*"
                >

            </fieldset>

            <button type="submit">
                ✅ Registrar participación
            </button>

        </form>

    </div>

</body>
</html>
